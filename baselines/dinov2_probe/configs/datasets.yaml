defaults:
  data_root: data/dinov2_baseline
  feature_root: outputs/dinov2_baseline/features
  result_root: outputs/dinov2_baseline/results
  train_split: train
  eval_split: test

linear_evaluation_sets:
  - imagenet1k
  - imagenet_real
  - imagenetv2
  - imagenet_a
  - imagenet_r
  - imagenet_c
  - imagenet_sketch
  - inat2018
  - inat2021
  - places205
  - kinetics400
  - ucf101
  - ssv2
  - food101
  - cifar10
  - cifar100
  - sun397
  - cars
  - fgvc_aircraft
  - voc2007
  - dtd
  - pets
  - caltech101
  - flowers102
  - cub200

restricted_sets:
  imagenet1k:
    required_paths:
      - imagenet1k/train
      - imagenet1k/val
    prepare: "Download ImageNet-1k from the official ImageNet site, arrange as imagenet1k/{train,val}/<wnid>/*.JPEG."
  kinetics400:
    required_paths:
      - kinetics400/train
      - kinetics400/val
    prepare: "Prepare Kinetics-400 from the official release or your licensed mirror. Use class subdirectories or train.csv/val.csv manifests."
  ssv2:
    required_paths:
      - ssv2/train
      - ssv2/val
    prepare: "Prepare Something-Something v2 from the official release. Use class subdirectories or train.csv/val.csv manifests."

datasets:
  imagenet1k:
    type: imagefolder
    root: imagenet1k
    train_split: train
    eval_split: val
    num_classes: 1000
    restricted: true
  imagenet_real:
    type: imagenet_real
    root: imagenet1k/val
    train_dataset: imagenet1k
    train_split: train
    eval_split: val
    num_classes: 1000
    restricted: true
  imagenetv2:
    type: clip_benchmark
    clip_name: imagenetv2
    root: imagenetv2
    train_dataset: imagenet1k
    train_split: train
    eval_split: test
    num_classes: 1000
  imagenet_a:
    type: imagenet_wnid_folder
    root: imagenet-a
    train_dataset: imagenet1k
    train_split: train
    eval_split: test
    num_classes: 1000
  imagenet_r:
    type: imagenet_wnid_folder
    root: imagenet-r
    train_dataset: imagenet1k
    train_split: train
    eval_split: test
    num_classes: 1000
  imagenet_c:
    type: imagenet_c
    root: imagenet-c
    train_dataset: imagenet1k
    train_split: train
    eval_split: test
    severity: all
    corruption: all
    num_classes: 1000
  imagenet_sketch:
    type: imagenet_wnid_folder
    root: imagenet-sketch
    train_dataset: imagenet1k
    train_split: train
    eval_split: test
    num_classes: 1000
  inat2018:
    type: imagefolder
    root: inaturalist2018
    train_split: train
    eval_split: val
  inat2021:
    type: imagefolder
    root: inaturalist2021
    train_split: train
    eval_split: val
  places205:
    type: imagefolder
    root: places205
    train_split: train
    eval_split: val
  kinetics400:
    type: video_folder
    root: kinetics400
    train_split: train
    eval_split: val
    frame_count: 8
    aggregation: mean
    restricted: true
  ucf101:
    type: video_folder
    root: ucf101
    train_split: train
    eval_split: test
    frame_count: 8
    aggregation: mean
  ssv2:
    type: video_folder
    root: ssv2
    train_split: train
    eval_split: val
    frame_count: 8
    aggregation: concat
    restricted: true
  food101:
    type: clip_benchmark
    clip_name: food101
    root: food101
    train_split: train
    eval_split: test
  cifar10:
    type: clip_benchmark
    clip_name: cifar10
    root: cifar10
    train_split: train
    eval_split: test
  cifar100:
    type: clip_benchmark
    clip_name: cifar100
    root: cifar100
    train_split: train
    eval_split: test
  sun397:
    type: clip_benchmark
    clip_name: sun397
    root: sun397
    train_split: train
    eval_split: test
  cars:
    type: clip_benchmark
    clip_name: cars
    root: cars
    train_split: train
    eval_split: test
  fgvc_aircraft:
    type: clip_benchmark
    clip_name: fgvc_aircraft
    root: fgvc_aircraft
    train_split: trainval
    eval_split: test
  voc2007:
    type: clip_benchmark
    clip_name: voc2007
    root: voc2007
    train_split: train
    eval_split: test
  dtd:
    type: clip_benchmark
    clip_name: dtd
    root: dtd
    train_split: train
    eval_split: test
  pets:
    type: clip_benchmark
    clip_name: pets
    root: pets
    train_split: trainval
    eval_split: test
  caltech101:
    type: clip_benchmark
    clip_name: caltech101
    root: caltech101
    train_split: train
    eval_split: test
  flowers102:
    type: clip_benchmark
    clip_name: flowers
    root: flowers102
    train_split: train
    eval_split: test
  cub200:
    type: imagefolder
    root: cub200
    train_split: train
